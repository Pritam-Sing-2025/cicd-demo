name: CI/CD Demo

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build
        run: echo "Building Project"

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Run Tests
        run: echo "Testing Project"

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy
        run: echo "Deploying Project"